    <title>Netfloor Game</title>
    <style>
        body {
            text-align: center;
            background-color: #f0f0f0;
            font-family: sans-serif;
        }
        img {
            width: 5cm;
            height: 5cm;
            display: block;
            margin: 0 auto 20px auto;
        }
        button {
            height: 1cm;
            width: 3cm; /* Kicsit szélesebb, hogy a szöveg biztosan kiférjen */
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s ease, background-color 0.3s ease; /* Szép, lágy átmenet */
        }
        button:hover {
            transform: rotate(10deg); /* Kijavítva fokra (deg) */
            background-color: aqua;
        }
    </style>
</head>
